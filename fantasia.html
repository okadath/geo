<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tecto — mapa de fantasía</title>
<style>
  :root {
    --fondo: #10141c; --panel: #171d28; --borde: #262f40;
    --texto: #dde4ee; --tenue: #8090a5; --acento: #c9a24a; --rojo: #d06a5a;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body {
    margin: 0; background: var(--fondo); color: var(--texto);
    font: 15px/1.5 system-ui, sans-serif; min-height: 100vh;
  }
  header { padding: 16px 26px 6px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  h1 { margin: 0; font-size: 20px; font-weight: 650;
       font-family: "Luminari", "Uncial Antiqua", Georgia, serif; letter-spacing: .04em; }
  h1 small { color: var(--tenue); font-weight: 400; margin-left: 10px; font-size: 13px;
             font-family: system-ui, sans-serif; letter-spacing: 0; }
  header a { color: var(--acento); font-size: 13px; text-decoration: none; }
  header a:hover { text-decoration: underline; }
  main { padding: 8px 26px 26px; }
  section {
    background: var(--panel); border: 1px solid var(--borde);
    border-radius: 12px; padding: 14px;
  }
  .error { color: var(--rojo); padding: 10px 26px; }

  .visor-ctrl { display: flex; flex-wrap: wrap; gap: 6px 14px; align-items: center;
                font-size: 13px; margin-bottom: 10px; }
  .visor-ctrl label { display: inline-flex; gap: 5px; align-items: center;
                      cursor: pointer; color: var(--texto); }
  .visor-ctrl input[type=checkbox] { accent-color: var(--acento); }
  .visor-ctrl select, .visor-ctrl input[type=text] {
    background: var(--fondo); color: var(--texto); border: 1px solid var(--borde);
    border-radius: 7px; padding: 4px 7px; font: inherit; font-size: 13px;
  }
  .visor-ctrl input[type=text] { width: 130px; }
  .sep { width: 1px; height: 20px; background: var(--borde); }
  button {
    background: var(--fondo); color: var(--texto); border: 1px solid var(--borde);
    border-radius: 8px; padding: 5px 10px; font: inherit; font-size: 13px;
    cursor: pointer; white-space: nowrap;
  }
  button:hover { border-color: var(--acento); }
  #visor {
    position: relative; overflow: hidden; border-radius: 10px;
    border: 1px solid var(--borde); background: #0a0d13; cursor: grab;
    width: 100%; aspect-ratio: 2 / 1; touch-action: none;
  }
  #visor.agarrando { cursor: grabbing; }
  #lienzo { position: absolute; inset: 0; transform-origin: 0 0; }
  #deco {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; display: block;
  }
  #lienzo > img {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    transform-origin: 0 0; display: block;
    user-select: none; -webkit-user-drag: none;
  }
  /* mientras se re-hornea el sector: el PNG viejo estirado se muestra
     pixelado (look intencional de "cargando", no borroso "de error") */
  #visor.cargando #mapa { image-rendering: pixelated; }
  #cargador {
    position: absolute; top: 14px; right: 14px; z-index: 5;
    display: flex; align-items: center; gap: 10px; pointer-events: none;
    background: rgba(16, 20, 28, .88); color: var(--texto);
    border: 1px solid var(--borde); border-radius: 10px;
    padding: 10px 18px; font-size: 17px; font-weight: 600;
    letter-spacing: .02em; box-shadow: 0 2px 10px rgba(0, 0, 0, .35);
    opacity: 0; transition: opacity .15s ease .18s;
  }
  #cargador .spin { width: 21px; height: 21px; border-width: 3px; }
  #visor.cargando #cargador { opacity: 1; }
  /* telon detras del lienzo: las zonas de mundo que el PNG del sector aun no
     cubre (p.ej. al hacer zoom-out) no se ven negras sino como "cargando" */
  #telon {
    position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(45deg,
      rgba(0, 0, 0, .08) 0 16px, rgba(0, 0, 0, 0) 16px 32px);
    opacity: 0; transition: opacity .2s ease;
  }
  #visor.cargando #telon { opacity: .6; animation: telon-mov 1.1s linear infinite; }
  @keyframes telon-mov { to { background-position: 45.25px 0; } }
  #estado { color: var(--tenue); font-size: 13px; margin: 10px 2px 0; }
  #estado.error { color: var(--rojo); }

  .spin { width: 15px; height: 15px; border-radius: 50%; display: inline-block;
          border: 2px solid var(--borde); border-top-color: var(--acento);
          animation: giro .7s linear infinite; vertical-align: middle; }
  @keyframes giro { to { transform: rotate(360deg); } }

  .panel-rotulos { margin: 10px 0 0; padding: 10px 12px; border: 1px solid var(--borde);
                   border-radius: 10px; background: var(--fondo); font-size: 13px; }
  .pr-cab { display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 8px; }
  .pr-ayuda { color: var(--tenue); font-size: 12px; }
  .pr-lista { max-height: 320px; overflow: auto; }
  .pr-grupo { margin: 4px 0 10px; }
  .pr-grupo h4 { margin: 6px 0 4px; color: var(--acento); font-size: 12px;
                 text-transform: uppercase; letter-spacing: .05em; font-weight: 650; }
  .pr-fila { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
  .pr-fila input[type=text] {
    flex: 1; min-width: 120px; background: var(--panel); color: var(--texto);
    border: 1px solid var(--borde); border-radius: 6px; padding: 3px 6px; font: inherit;
    font-size: 13px;
  }
  .pr-fila.oculto input[type=text] { opacity: .45; text-decoration: line-through; }
  .pr-fila label { display: inline-flex; gap: 4px; align-items: center; color: var(--tenue);
                   font-size: 12px; cursor: pointer; white-space: nowrap; }
  .pr-fila input[type=checkbox] { accent-color: var(--acento); }
</style>
</head>
<body>
<header>
  <h1>Mapa de fantasía<small id="sub-titulo"></small></h1>
  <a id="a-regiones" href="#">← regiones</a>
  <a id="a-juego" href="#">🎮 jugar conquista</a>
</header>
<div id="aviso" class="error" hidden></div>
<main>
  <section>
    <div class="visor-ctrl">
      <label><input type="checkbox" id="cb-relieve" checked>relieve</label>
      <label><input type="checkbox" id="cb-veg" checked>vegetación</label>
      <label><input type="checkbox" id="cb-rios" checked>ríos</label>
      <label><input type="checkbox" id="cb-caminos" checked>caminos / rutas</label>
      <label><input type="checkbox" id="cb-asent" checked>asentamientos</label>
      <label><input type="checkbox" id="cb-rotulos" checked>rótulos</label>
      <label><input type="checkbox" id="cb-tinte">tinte político</label>
      <span class="sep"></span>
      <label>países
        <select id="sel-paises" title="qué rótulos de países mostrar (con muchos países el mapa completo se satura)">
          <option value="grandes" selected>solo los más grandes</option>
          <option value="todos">todos</option>
        </select>
      </label>
      <label>cuántos <input type="number" id="in-npaises" min="1" max="64" value="8"
        title="cuántos países (los más grandes por área) rotular"
        style="width:56px"></label>
      <label title="tamaño de los nombres de países">Aa países
        <input type="range" id="sl-fs-pais" min="0.4" max="2" step="0.1" value="1"
          style="width:80px;vertical-align:middle">
        <output id="v-fs-pais">1.0×</output>
      </label>
      <label title="tamaño de los nombres de ciudades/asentamientos">Aa ciudades
        <input type="range" id="sl-fs-ciu" min="0.4" max="2.5" step="0.1" value="1.8"
          style="width:80px;vertical-align:middle">
        <output id="v-fs-ciu">1.8×</output>
      </label>
      <span class="sep"></span>
      <label>paleta
        <select id="sel-paleta">
          <option value="claro">pergamino claro</option>
          <option value="sepia">sepia envejecido</option>
          <option value="noche">noche azulada</option>
          <option value="imprenta">tinta imprenta</option>
          <option value="esmeralda">esmeralda</option>
          <option value="carmesi">carmesí y oro</option>
          <option value="oceanico">atlas oceánico</option>
        </select>
      </label>
      <label>calidad
        <select id="sel-calidad" title="mapas más grandes: detalles y rótulos más finos y densos">
          <option value="1">normal</option>
          <option value="2" selected>alta (2×)</option>
          <option value="3">ultra (3×)</option>
          <option value="4">extrema (4×)</option>
        </select>
      </label>
      <label>semilla <input type="text" id="in-semilla" spellcheck="false"></label>
      <button type="button" id="b-regen">↻ regenerar</button>
      <span class="sep"></span>
      <button type="button" id="b-reset">⟲ zoom</button>
      <span id="v-zoom" title="zoom actual de la vista"
        style="font-variant-numeric:tabular-nums">×1.0</span>
      <span class="sep"></span>
      <button type="button" id="b-rotulos" title="renombrar u ocultar rótulos">✏ rótulos</button>
      <span class="sep"></span>
      <label>resolución
        <select id="sel-res" title="tamaño del PNG exportado (los grandes tardan más en hornear)">
          <option value="2048">2048 px</option>
          <option value="4096" selected>4096 px</option>
          <option value="8192">8192 px</option>
        </select>
      </label>
      <label><input type="checkbox" id="cb-deco" checked>incluir marco/deco</label>
      <button type="button" id="b-export">💾 exportar PNG</button>
      <button type="button" id="b-export-sector">✂ exportar sector</button>
      <span id="spin" class="spin" hidden></span>
    </div>
    <div id="panel-rotulos" class="panel-rotulos" hidden>
      <div class="pr-cab">
        <strong>Rótulos editables</strong>
        <span class="pr-ayuda">renombra u oculta; al guardar se re-renderiza</span>
        <span style="flex:1"></span>
        <button type="button" id="b-rotulos-guardar">guardar y re-render</button>
        <button type="button" id="b-rotulos-restaurar" title="borra todos los overrides">restaurar todo</button>
        <button type="button" id="b-rotulos-cerrar">cerrar</button>
      </div>
      <div id="pr-lista" class="pr-lista">cargando rótulos…</div>
    </div>
    <div id="visor">
      <div id="telon"></div>
      <div id="lienzo">
        <img id="mapa" alt="">
      </div>
      <img id="deco" alt="">
      <div id="cargador"><span class="spin"></span>definiendo…</div>
    </div>
    <p id="estado">cargando…</p>
  </section>
</main>
<script>
(function () {
  "use strict";
  // ------------------------------------------------------------------------
  //  Visor delgado: TODO el dibujo del mapa (pergamino, glifos, ríos,
  //  rótulos, decoración) se renderiza en el servidor (fantasia_srv.py).
  //  Aquí solo hay presentación: controles, pan/zoom y carga de PNGs.
  //    GET /api/fantasia/render  -> mapa completo (para exportar)
  //    GET /api/fantasia/sector  -> ventana de mundo re-horneada (nítida)
  //    GET /api/fantasia/deco    -> overlay transparente (marco, rosa, …)
  // ------------------------------------------------------------------------
  const $ = id => document.getElementById(id);
  const q = new URLSearchParams(location.search);
  const sello = q.get("sello") || "", stem = q.get("d") || "";

  // ---- validación de la query (mismas reglas que el allowlist del servidor) ----
  if (!/^[0-9]{8}-[0-9]{6}(?:-[0-9]+)?$/.test(sello) ||
      !/^d[0-9]{6}_f[0-9]+_[0-9a-f]{6}$/.test(stem)) {
    $("aviso").hidden = false;
    $("aviso").textContent =
      "Falta ?sello=…&d=… válidos en la URL (abre esta página desde un detalle en /regiones).";
    $("estado").textContent = "";
    return;
  }
  $("sub-titulo").textContent = `${sello} · ${stem}`;
  $("a-regiones").href = `/regiones?sello=${sello}&d=${stem}`;
  $("a-juego").href = `/juego?sello=${sello}&d=${stem}`;

  // color de fondo del visor por paleta (solo UI)
  const FONDO_UI = {
    claro: "#e9dcbf", sepia: "#dcc79a", noche: "#22303f",
    imprenta: "#fafafa", esmeralda: "#dee3c7", carmesi: "#ebdfc5",
    oceanico: "#e2ecf2",
  };

  // ==========================================================================
  //  estado (solo presentación)
  // ==========================================================================
  const st = {
    scale: 1, tx: 0, ty: 0,
    nx: 1536, ny: 768,         // resolución (coords de mundo del detalle; 2:1 por defecto)
    semilla: stem,
    paleta: "claro",
    calidad: 2,
    win: null,                 // ventana de mundo del PNG mostrado
    listo: false,
    rotver: 0,                 // versión de overrides de rótulos (bust de caché)
  };
  const mapa = $("mapa"), deco = $("deco"), lienzo = $("lienzo"), visor = $("visor");
  // fondo del visor = papel de la paleta desde el inicio: las zonas de mundo
  // que el sector renderizado aun no cubre se ven "papel cargando", no negras
  visor.style.background = FONDO_UI[st.paleta];

  // ==========================================================================
  //  URLs de la API de render
  // ==========================================================================
  function capasActivas() {
    const c = [];
    if ($("cb-relieve").checked) c.push("relieve");
    if ($("cb-veg").checked) c.push("veg");
    if ($("cb-rios").checked) c.push("rios");
    if ($("cb-caminos").checked) c.push("caminos");
    if ($("cb-asent").checked) c.push("asent");
    if ($("cb-rotulos").checked) c.push("rotulos");
    if ($("cb-tinte").checked) c.push("tinte");
    return c.join(",");
  }
  function paramsBase() {
    const p = new URLSearchParams();
    p.set("sello", sello); p.set("d", stem);
    p.set("calidad", String(st.calidad));
    p.set("semilla", st.semilla);
    p.set("paleta", st.paleta);
    p.set("capas", capasActivas());
    p.set("paises", $("sel-paises").value);
    if ($("sel-paises").value === "grandes") {
      const n = Math.max(1, Math.min(64, parseInt($("in-npaises").value, 10) || 8));
      p.set("npaises", String(n));
    }
    const fsp = parseFloat($("sl-fs-pais").value) || 1;
    const fsc = parseFloat($("sl-fs-ciu").value) || 1;
    if (fsp !== 1) p.set("fspais", fsp.toFixed(1));
    if (fsc !== 1) p.set("fsciu", fsc.toFixed(1));
    return p;
  }
  function urlSector(win, extras) {
    const p = paramsBase();
    p.set("cx", (win.x0 + win.w / 2).toFixed(3));
    p.set("cy", (win.y0 + win.h / 2).toFixed(3));
    p.set("w", win.w.toFixed(3));
    p.set("h", win.h.toFixed(3));
    if (st.rotver) p.set("rv", String(st.rotver));
    for (const k in (extras || {})) p.set(k, extras[k]);
    return "/api/fantasia/sector?" + p;
  }
  function urlDeco(win) {
    const p = new URLSearchParams();
    p.set("sello", sello); p.set("d", stem);
    p.set("calidad", String(st.calidad));
    p.set("paleta", st.paleta);
    p.set("cx", (win.x0 + win.w / 2).toFixed(3));
    p.set("cy", (win.y0 + win.h / 2).toFixed(3));
    p.set("w", win.w.toFixed(3));
    p.set("h", win.h.toFixed(3));
    p.set("px", "1200");
    return "/api/fantasia/deco?" + p;
  }

  // ==========================================================================
  //  carga inicial: solo la resolución del detalle (datos, no lógica)
  // ==========================================================================
  fetch(`/salidas/${sello}/detalles/${stem}_capas.json`).then(r => {
    if (!r.ok) throw new Error("no se pudo leer _capas.json");
    return r.json();
  }).then(c => {
    [st.nx, st.ny] = c.resolucion || [1536, 768];
    st.listo = true;
    $("in-semilla").value = st.semilla;
    // vista inicial opcional por query: ?c=<calidad 1..4>&z=<zoom>&cx=&cy=
    const qc = parseInt(q.get("c") || "", 10);
    if (qc >= 1 && qc <= 4) st.calidad = qc;
    $("sel-calidad").value = String(st.calidad);
    ajustarLienzo();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const qz = parseFloat(q.get("z") || "");
      if (qz > 1) {
        st.scale = Math.min(6 + 12 * st.calidad, qz);
        const W = visor.clientWidth || 1, Hv = visor.clientHeight || 1;
        const qx = parseFloat(q.get("cx") || ""), qy = parseFloat(q.get("cy") || "");
        st.tx = W / 2 - (isNaN(qx) ? st.nx / 2 : qx) / st.nx * W * st.scale;
        st.ty = Hv / 2 - (isNaN(qy) ? st.ny / 2 : qy) / st.ny * Hv * st.scale;
        acotar(); aplicar();
      }
      renderVisible();
    }));
    $("estado").textContent = "rueda = zoom (re-render nítido del sector) · arrastrar = paneo · sube la calidad para un mundo más grande y detallado";
  }).catch(e => {
    $("estado").textContent = "No se pudo cargar el detalle: " + e.message;
    $("estado").className = "error";
  });

  // ---- ventana de mundo visible según el zoom/paneo actual ----
  function winVisible(pad) {
    const W = visor.clientWidth || 1, Hv = visor.clientHeight || 1;
    let w = st.nx / st.scale, h = st.ny / st.scale;
    let x0 = -st.tx / st.scale / W * st.nx;
    let y0 = -st.ty / st.scale / Hv * st.ny;
    // margen alrededor de lo visible: panear un poco no muestra lienzo vacío
    x0 -= w * pad; y0 -= h * pad;
    w *= 1 + 2 * pad; h *= 1 + 2 * pad;
    if (w > st.nx) { w = st.nx; h = st.ny; }
    x0 = Math.max(0, Math.min(st.nx - w, x0));
    y0 = Math.max(0, Math.min(st.ny - h, y0));
    return { x0, y0, w, h };
  }

  // ==========================================================================
  //  carga del sector renderizado en el servidor
  // ==========================================================================
  let genRender = 0;        // descarta respuestas viejas fuera de orden
  function renderVisible() {
    if (!st.listo) return;
    const win = winVisible(0.18);
    const gen = ++genRender;
    const url = urlSector(win);
    visor.classList.add("cargando");
    $("estado").textContent = "definiendo el sector en el servidor…";
    const im = new Image();
    im.onload = () => {
      if (gen !== genRender) return;              // llegó tarde: ya hay otra vista
      visor.classList.remove("cargando");
      mapa.src = url;
      st.win = win;
      colocarMapa();
      $("estado").textContent = "rueda = zoom (re-render nítido del sector) · arrastrar = paneo · sube la calidad para un mundo más grande y detallado";
    };
    im.onerror = () => {
      if (gen !== genRender) return;
      visor.classList.remove("cargando");
      $("estado").textContent = "el servidor no pudo renderizar el sector";
      $("estado").className = "error";
    };
    im.src = url;
    // overlay de decoración: fijo al visor, para la vista visible exacta
    deco.src = urlDeco(winVisible(0));
  }
  const redibujar = renderVisible;

  // coloca la imagen (que contiene solo st.win) dentro del lienzo, de modo
  // que coincida pixel-perfecto con la posición de esa ventana en el mundo
  function colocarMapa() {
    if (!st.win) return;
    mapa.style.transform =
      `translate(${st.win.x0 / st.nx * 100}%, ${st.win.y0 / st.ny * 100}%) ` +
      `scale(${st.win.w / st.nx})`;
  }

  // re-render diferido: durante la interacción el PNG viejo se escala por
  // CSS (rápido) y ~220 ms después de soltar se pide nítido el sector
  let tmrRender = 0;
  function programarRender() {
    clearTimeout(tmrRender);
    visor.classList.add("cargando");   // feedback inmediato: pixelado + loader
    tmrRender = setTimeout(renderVisible, 220);
  }

  function ajustarLienzo() {
    visor.style.aspectRatio = st.nx + " / " + st.ny;
  }

  // ==========================================================================
  //  zoom / paneo (patrón de regiones.html)
  // ==========================================================================
  function aplicar() {
    lienzo.style.transform = `translate(${st.tx}px,${st.ty}px) scale(${st.scale})`;
    $("v-zoom").textContent = "×" + (st.scale >= 10 ? st.scale.toFixed(0)
                                                    : st.scale.toFixed(1));
  }
  function acotar() {
    const W = visor.clientWidth, H = visor.clientHeight;
    const sw = W * st.scale, sh = H * st.scale;
    st.tx = sw <= W ? (W - sw) / 2 : Math.min(0, Math.max(W - sw, st.tx));
    st.ty = sh <= H ? (H - sh) / 2 : Math.min(0, Math.max(H - sh, st.ty));
  }
  visor.addEventListener("wheel", e => {
    e.preventDefault();
    const r = visor.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const wx = (mx - st.tx) / st.scale, wy = (my - st.ty) / st.scale;
    const f = e.deltaY < 0 ? 1.2 : 1 / 1.2;
    // a más calidad se permite acercarse más: el sector se re-hornea nítido
    const ns = Math.min(6 + 12 * st.calidad, Math.max(1, st.scale * f));
    st.tx = mx - wx * ns; st.ty = my - wy * ns; st.scale = ns;
    acotar(); aplicar(); programarRender();
  }, { passive: false });
  let abajo = null;
  visor.addEventListener("mousedown", e => {
    abajo = { x: e.clientX, y: e.clientY }; visor.classList.add("agarrando");
  });
  window.addEventListener("mouseup", () => { abajo = null; visor.classList.remove("agarrando"); });
  window.addEventListener("mousemove", e => {
    if (!abajo) return;
    st.tx += e.movementX; st.ty += e.movementY;
    acotar(); aplicar(); programarRender();
  });
  new ResizeObserver(() => {
    if (!st.listo || !st.win) return;
    acotar(); aplicar(); colocarMapa(); programarRender();
  }).observe(visor);

  // ==========================================================================
  //  controles
  // ==========================================================================
  for (const id of ["cb-relieve", "cb-veg", "cb-rios", "cb-caminos", "cb-asent", "cb-rotulos", "cb-tinte"])
    $(id).addEventListener("change", redibujar);
  $("sel-paises").addEventListener("change", redibujar);
  $("in-npaises").addEventListener("change", redibujar);
  // sliders de tamaño: el valor se muestra en vivo, el re-render (costoso,
  // va al servidor) solo se dispara al soltar el control
  for (const [sl, out] of [["sl-fs-pais", "v-fs-pais"], ["sl-fs-ciu", "v-fs-ciu"]]) {
    $(sl).addEventListener("input", e => {
      $(out).textContent = parseFloat(e.target.value).toFixed(1) + "×";
    });
    $(sl).addEventListener("change", redibujar);
  }
  $("sel-paleta").addEventListener("change", e => {
    st.paleta = e.target.value; visor.style.background = FONDO_UI[st.paleta]; redibujar();
  });
  $("sel-calidad").addEventListener("change", e => {
    st.calidad = Math.max(1, Math.min(4, parseInt(e.target.value, 10) || 1));
    st.scale = Math.min(st.scale, 6 + 12 * st.calidad);
    acotar(); aplicar();
    renderVisible();
  });
  $("b-regen").addEventListener("click", () => {
    st.semilla = $("in-semilla").value || stem;
    redibujar();
  });
  $("in-semilla").addEventListener("keydown", e => { if (e.key === "Enter") $("b-regen").click(); });
  $("b-reset").addEventListener("click", () => {
    st.scale = 1; st.tx = 0; st.ty = 0; acotar(); aplicar(); renderVisible();
  });
  $("b-export").addEventListener("click", () => exportar(null));
  $("b-export-sector").addEventListener("click", () => exportar(winVisible(0)));

  // nombre de archivo descriptivo: stem, paleta, semilla y resolución
  function nombreArchivo(sector, win, px) {
    const sem = (st.semilla || stem).replace(/[^0-9a-zA-Z_-]+/g, "_").slice(0, 24);
    const suf = sector ? `_sector_${Math.round(win.x0)}x${Math.round(win.y0)}` : "";
    return `fantasia_${stem}_${st.paleta}_${sem}_${px}px${suf}.png`;
  }

  // exporta el mapa completo (win = null) o el sector visible: el servidor
  // lo hornea desde cero a la resolución elegida, con o sin decoración.
  // Se descarga vía fetch->blob para poder mostrar spinner mientras hornea.
  let exportando = false;
  async function exportar(win) {
    if (!st.listo || exportando) return;
    const sector = !!win;
    const deco = $("cb-deco").checked ? "1" : "0";
    const px = String(Math.min(8192, Math.max(512,
      parseInt($("sel-res").value, 10) || 4096)));
    let url;
    if (sector) {
      url = urlSector(win, { deco, px });
    } else {
      const p = paramsBase();
      p.set("deco", deco);
      p.set("px", px);
      if (st.rotver) p.set("rv", String(st.rotver));
      url = "/api/fantasia/render?" + p;
    }
    exportando = true;
    $("spin").hidden = false;
    $("estado").className = "";
    $("estado").textContent = `horneando PNG en el servidor (${px} px)… los grandes tardan`;
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP " + r.status);
      const blob = await r.blob();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = nombreArchivo(sector, win, px);
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 4000);
      $("estado").textContent = `PNG exportado (${px} px).`;
    } catch (e) {
      $("estado").textContent = "no se pudo exportar: " + e.message;
      $("estado").className = "error";
    } finally {
      exportando = false;
      $("spin").hidden = true;
    }
  }

  // ==========================================================================
  //  panel de rótulos editables (renombrar / ocultar; persistente en servidor)
  //    GET  /api/fantasia/rotulos  -> lista de rótulos con override vigente
  //    POST /api/fantasia/rotulos  -> guarda el mapa completo de overrides
  // ==========================================================================
  const TIPO_NOMBRE = { asent: "Asentamientos", pais: "Países", mar: "Mares", rio: "Ríos" };
  let rotOrig = [];

  $("b-rotulos").addEventListener("click", () => {
    const p = $("panel-rotulos");
    p.hidden = !p.hidden;
    if (!p.hidden) cargarRotulos();
  });
  $("b-rotulos-cerrar").addEventListener("click", () => { $("panel-rotulos").hidden = true; });

  function cargarRotulos() {
    $("pr-lista").textContent = "cargando rótulos…";
    const p = new URLSearchParams({ sello, d: stem });
    fetch("/api/fantasia/rotulos?" + p).then(r => r.json()).then(j => {
      if (j.error) { $("pr-lista").textContent = "error: " + j.error; return; }
      rotOrig = j.rotulos || [];
      pintarRotulos();
    }).catch(e => { $("pr-lista").textContent = "no se pudo cargar: " + e.message; });
  }

  function pintarRotulos() {
    const cont = $("pr-lista");
    cont.textContent = "";
    if (!rotOrig.length) { cont.textContent = "este detalle no tiene rótulos."; return; }
    for (const tipo of ["asent", "pais", "mar", "rio"]) {
      const items = rotOrig.filter(r => r.tipo === tipo);
      if (!items.length) continue;
      const g = document.createElement("div");
      g.className = "pr-grupo";
      const h = document.createElement("h4");
      h.textContent = `${TIPO_NOMBRE[tipo]} (${items.length})`;
      g.appendChild(h);
      for (const it of items) {
        const ov = it.override || {};
        const fila = document.createElement("div");
        fila.className = "pr-fila" + (ov.oculto ? " oculto" : "");
        fila.dataset.id = it.id;
        const inp = document.createElement("input");
        inp.type = "text"; inp.maxLength = 60;
        inp.value = ov.nombre || it.nombre;
        inp.placeholder = it.nombre; inp.dataset.orig = it.nombre;
        inp.className = "pr-nombre";
        const lab = document.createElement("label");
        const chk = document.createElement("input");
        chk.type = "checkbox"; chk.className = "pr-ocultar"; chk.checked = !!ov.oculto;
        chk.addEventListener("change", () => fila.classList.toggle("oculto", chk.checked));
        lab.appendChild(chk); lab.appendChild(document.createTextNode("ocultar"));
        fila.appendChild(inp); fila.appendChild(lab);
        g.appendChild(fila);
      }
      cont.appendChild(g);
    }
  }

  function recogerOverrides() {
    const ov = {};
    for (const fila of $("pr-lista").querySelectorAll(".pr-fila")) {
      const inp = fila.querySelector(".pr-nombre");
      const chk = fila.querySelector(".pr-ocultar");
      const e = {};
      const nombre = inp.value.trim().slice(0, 60);
      if (chk.checked) e.oculto = true;
      if (nombre && nombre !== inp.dataset.orig) e.nombre = nombre;
      if (e.oculto || e.nombre) ov[fila.dataset.id] = e;
    }
    return ov;
  }

  function guardarRotulos(overrides) {
    return fetch("/api/fantasia/rotulos", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sello, d: stem, overrides }),
    }).then(r => r.json());
  }

  $("b-rotulos-guardar").addEventListener("click", () => {
    $("estado").className = ""; $("estado").textContent = "guardando rótulos…";
    guardarRotulos(recogerOverrides()).then(j => {
      if (j.error) { $("estado").textContent = "error: " + j.error; $("estado").className = "error"; return; }
      st.rotver++;              // fuerza refetch del sector con los nuevos rótulos
      cargarRotulos();
      renderVisible();
      $("estado").textContent = `rótulos guardados (${j.n} overrides).`;
    }).catch(e => { $("estado").textContent = "no se pudo guardar: " + e.message; $("estado").className = "error"; });
  });

  $("b-rotulos-restaurar").addEventListener("click", () => {
    guardarRotulos({}).then(() => {
      st.rotver++;
      cargarRotulos();
      renderVisible();
      $("estado").className = ""; $("estado").textContent = "rótulos restaurados.";
    }).catch(e => { $("estado").textContent = "no se pudo restaurar: " + e.message; $("estado").className = "error"; });
  });
})();
</script>
</body>
</html>
